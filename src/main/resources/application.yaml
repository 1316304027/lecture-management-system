# ================================================================
# アプリケーション設定ファイル / Application Configuration File
# ================================================================

spring:
  # データソース設定 / Datasource Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/lecture_management
    username: postgres
    password: postgres

  jpa:
    hibernate:
      # update: 既存テーブルを維持しつつ差分を追加（score列が自動追加される）
      # update: Keep existing tables, add new columns (score column will be auto-added)
      ddl-auto: update
    show-sql: true

  thymeleaf:
    cache: false

  servlet:
    multipart:
      # ================================================================
      # 【重要バグ修正】PDFアップロードで「このページは動作していません」が
      # 発生していた根本原因はここの設定がなかったこと。
      # Spring Boot のデフォルトは 1MB なので、それ以上のPDFを送ると
      # サーバーがリクエストを弾いて 400/500 エラーになる。
      # max-file-size と max-request-size を 10MB に設定することで解決。
      #
      # [CRITICAL BUG FIX] Root cause of "このページは動作していません" on PDF upload:
      # Spring Boot default multipart limit is 1MB.
      # Sending a larger PDF causes 400/500 error before Controller receives it.
      # Fixed by setting max-file-size and max-request-size to 10MB.
      # ================================================================
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# ================================================================
# アプリ独自設定 / Application Custom Settings
# アップロードしたPDFファイルの保存先ディレクトリ
# Directory where uploaded PDF files are stored
# ================================================================

