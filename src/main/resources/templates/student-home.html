<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>受講者ホーム</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-success px-3">
    <span class="navbar-brand">PCFA受講管理システム</span>
    <div class="d-flex align-items-center gap-2">
        <span class="text-white" th:text="${loginUser.name} + ' さん'"></span>
        <!-- 代理ログイン中は「管理者へ戻る」ボタンを表示 -->
        <form th:if="${isProxy}" action="/admin/restore-session" method="post" class="d-inline">
            <button type="submit" class="btn btn-warning btn-sm">管理者へ戻る</button>
        </form>
        <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
    </div>
</nav>
<div class="container mt-4">
    <h2>受講コース一覧</h2>

    <div th:if="${courseList.empty}" class="alert alert-info">
        受講中のコースがありません。管理者にお問い合わせください。
    </div>

    <div class="row">
        <div class="col-md-6 mb-4" th:each="course : ${courseList}">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0" th:text="${course.name}"></h5>
                </div>
                <div class="card-body">
                    <p class="text-muted" th:text="${course.description}"></p>
                </div>
                <div class="card-footer d-flex gap-2">
                    <!-- 各機能へのリンク（courseIdをパラメータで渡す） -->
                    <a th:href="@{/student/attendance(courseId=${course.id})}"
                       class="btn btn-sm btn-outline-primary flex-fill">📋 出席登録</a>
                    <a th:href="@{/student/materials(courseId=${course.id})}"
                       class="btn btn-sm btn-outline-secondary flex-fill">📄 教材</a>
                    <a th:href="@{/student/assignments(courseId=${course.id})}"
                       class="btn btn-sm btn-outline-warning flex-fill">📝 課題</a>
                    <!-- チャットボタン：courseIdをパラメータで渡す -->
                    <a th:href="@{/chat(courseId=${course.id})}"
                       class="btn btn-sm btn-outline-info flex-fill">💬 チャット</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body></html>
