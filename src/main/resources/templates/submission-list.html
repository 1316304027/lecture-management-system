<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>提出履歴</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5">

        <h2 class="mb-4">
            提出履歴
        </h2>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>
                    課題
                </th>

                <th>
                    ファイル名
                </th>

                <th>
                    提出日時
                </th>

                <th>
                    点数
                </th>

                <th>
                    評価
                </th>

            </tr>

            </thead>

            <tbody>

            <tr
                    th:each="submission : ${submissionList}">

                <!-- 課題名 -->
                <td
                        th:text=
                                "${submission.assignment.title}">
                </td>

                <!-- ファイル名 -->
                <td>

                    <a
                            th:href=
                                    "@{/submissions/download/{id}(id=${submission.id})}">

                        <span
                                th:text=
                                        "${submission.originalFileName}">
                        </span>

                    </a>

                </td>

                <!-- 提出日時 -->
                <td
                        th:text=
                                "${#temporals.format(
                                submission.submittedAt,
                                'yyyy/MM/dd HH:mm'
                                )}">
                </td>

                <!-- 点数 -->
                <td
                        th:text="${submission.score}">
                </td>

                <!-- 評価 -->
                <td
                        th:text=
                                "${submission.evaluationComment}">
                </td>

            </tr>

            </tbody>

        </table>

        <a
                href="/student/home"
                class="btn btn-secondary">

            戻る

        </a>

    </div>

</div>

</body>
</html>
