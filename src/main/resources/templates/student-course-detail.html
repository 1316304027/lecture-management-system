<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        コース詳細
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5">

        <!-- コース名 -->
        <h2
                th:text="${course.name}">
        </h2>

        <hr>

        <!-- 課題一覧 -->
        <h4 class="mt-4">

            課題一覧

        </h4>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>
                    課題名
                </th>

                <th>
                    提出期限
                </th>

            </tr>

            </thead>

            <tbody>

            <tr
                    th:each="assignment : ${assignmentList}">

                <td
                        th:text="${assignment.title}">
                </td>

                <td
                        th:text=
                                "${#temporals.format(
                                assignment.deadline,
                                'yyyy/MM/dd HH:mm'
                                )}">
                </td>

            </tr>

            </tbody>

        </table>

        <!-- 教材一覧 -->
        <h4 class="mt-5">

            教材一覧

        </h4>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>
                    教材名
                </th>

            </tr>

            </thead>

            <tbody>

            <tr
                    th:each="material : ${materialList}">

                <td
                        th:text="${material.title}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
