<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>出欠確認</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand" href="/instructor/home">← ホームへ戻る</a>
    <span class="text-white" th:text="'出欠確認- ' + ${course.name}"></span>
    <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
</nav>
<div class="container mt-4">
    <h4>受講者出席率一覧（授業数：<span th:text="${totalLessons}"></span>回）</h4>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr><th>受講者名</th><th>出席回数</th><th>出席率</th><th>詳細</th></tr>
        </thead>
        <tbody>
            <tr th:each="u : ${studentList}">
                <td th:text="${u.name}"></td>
                <td th:text="${countMap[u.id]}"></td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="progress flex-grow-1" style="height:12px">
                            <div class="progress-bar"
                                 th:classappend="${rateMap[u.id] < 70} ? 'bg-danger' : 'bg-success'"
                                 role="progressbar"
                                 th:style="'width:' + ${rateMap[u.id]} + '%'"></div>
                        </div>
                        <span th:text="${rateMap[u.id]} + '%'"></span>
                    </div>
                </td>
                <td>
                    <a th:href="@{/instructor/attendance(courseId=${course.id}, studentId=${u.id})}"
                       class="btn btn-sm btn-outline-secondary">詳細表示</a>
                </td>
            </tr>
            <tr th:if="${studentList.empty}">
                <td colspan="4" class="text-muted text-center">受講者未登録</td>
            </tr>
        </tbody>
    </table>

    <!-- 選択した学生の出席詳細 -->
    <div th:if="${selectedStudent != null}" class="mt-4">
        <h5><span th:text="${selectedStudent.name}"></span> さんの出席履歴</h5>
        <table class="table table-sm table-bordered">
            <thead class="table-light"><tr><th>日付</th><th>登録時刻</th></tr></thead>
            <tbody>
                <tr th:each="a : ${detailHistory}">
                    <td th:text="${a.date}"></td>
                    <td th:text="${#temporals.format(a.attendedAt, 'HH:mm')}"></td>
                </tr>
                <tr th:if="${detailHistory.empty}">
                    <td colspan="2" class="text-muted text-center">出席記録なし</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body></html>
