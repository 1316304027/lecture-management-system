<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>チャット</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }

        /* チャット画面全体のコンテナ */
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
        }

        /* メッセージ一覧エリア（スクロール可能） */
        .chat-box {
            height: 450px;          /* 高さを固定 */
            overflow-y: auto;       /* 縦スクロールを有効化 */
            background: white;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #dee2e6;
        }

        /* 自分のメッセージ（右側に表示） */
        .message-mine {
            display: flex;
            justify-content: flex-end;  /* 右寄せ */
            margin-bottom: 12px;
        }
        .message-mine .bubble {
            background: #0d6efd;        /* 青色の吹き出し */
            color: white;
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px;
            max-width: 70%;
        }

        /* 相手のメッセージ（左側に表示） */
        .message-other {
            display: flex;
            justify-content: flex-start;  /* 左寄せ */
            margin-bottom: 12px;
        }
        .message-other .bubble {
            background: #e9ecef;           /* グレーの吹き出し */
            color: #212529;
            border-radius: 18px 18px 18px 4px;
            padding: 10px 14px;
            max-width: 70%;
        }

        /* 送信者名・時刻の表示 */
        .msg-meta {
            font-size: 11px;
            color: #6c757d;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <!-- ロールによってホームのURLを変える -->
    <a class="navbar-brand" th:href="${loginUser.role == 'STUDENT'} ? '/student/home' : '/instructor/home'">
        ← ホームへ戻る
    </a>
    <span class="text-white fw-bold"
          th:text="'💬 チャット - ' + ${course.name}"></span>
    <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
</nav>

<div class="chat-container">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-bold">
            💬 <span th:text="${course.name}"></span> のチャット
        </div>

        <!-- メッセージ一覧 -->
        <div class="chat-box" id="chatBox">
            <!--
                th:each でメッセージリストをループ処理
                自分のメッセージは右側、相手のメッセージは左側に表示
            -->
            <div th:each="msg : ${messages}">
                <!-- 自分のメッセージ -->
                <div th:if="${msg.sender.id == loginUser.id}"
                     class="message-mine">
                    <div>
                        <div class="msg-meta text-end">
                            <span th:text="${#temporals.format(msg.sentAt, 'MM/dd HH:mm')}"></span>
                        </div>
                        <div class="bubble" th:text="${msg.content}"></div>
                    </div>
                </div>
                <!-- 相手のメッセージ -->
                <div th:unless="${msg.sender.id == loginUser.id}"
                     class="message-other">
                    <div>
                        <div class="msg-meta">
                            <!-- ロール表示（学生=青・教師=緑） -->
                            <span th:if="${msg.sender.role == 'STUDENT'}"
                                  class="badge bg-info text-dark me-1">学生</span>
                            <span th:if="${msg.sender.role == 'INSTRUCTOR'}"
                                  class="badge bg-success me-1">教師</span>
                            <span th:text="${msg.sender.name}"></span>
                            <span class="ms-2"
                                  th:text="${#temporals.format(msg.sentAt, 'MM/dd HH:mm')}"></span>
                        </div>
                        <div class="bubble" th:text="${msg.content}"></div>
                    </div>
                </div>
            </div>

            <!-- メッセージが1件もない場合 -->
            <div th:if="${messages.empty}"
                 class="text-center text-muted py-5">
                まだメッセージはありません。最初のメッセージを送りましょう！
            </div>
        </div>

        <!-- メッセージ送信フォーム -->
        <div class="card-footer">
            <form th:action="@{/chat/send}" method="post"
                  class="d-flex gap-2">
                <input type="hidden" name="courseId" th:value="${courseId}">
                <input type="text" name="content"
                       class="form-control"
                       placeholder="メッセージを入力..."
                       maxlength="500"
                       required
                       autocomplete="off">
                <button type="submit"
                        class="btn btn-primary text-nowrap">送信</button>
            </form>
        </div>
    </div>
</div>

<script>
    // ページ読み込み時にチャットボックスを一番下までスクロール
    // これにより最新のメッセージが表示される
    window.onload = function() {
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;
    };
</script>
</body>
</html>
