<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>課題管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand" href="/instructor/home">← ホームへ戻る</a>
    <span class="text-white" th:text="'課題管理 - ' + ${course.name}"></span>
    <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
</nav>
<div class="container mt-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 課題作成フォーム -->
    <div class="card mb-4">
        <div class="card-header bg-warning text-dark">課題作成</div>
        <div class="card-body">
            <form th:action="@{/instructor/assignments}" method="post" enctype="multipart/form-data" class="row g-2">
                <input type="hidden" name="courseId" th:value="${course.id}">
                <div class="col-md-4">
                    <input type="text" name="title" class="form-control" placeholder="課題タイトル" required>
                </div>
                <div class="col-md-3">
                    <input type="datetime-local" name="deadline" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <input type="file" name="file" class="form-control" accept=".pdf">
                    <small class="text-muted">課題PDFを添付（任意）</small>
                </div>
                <div class="col-md-1">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="published" value="true" id="pub2">
                        <label class="form-check-label" for="pub2">即時公開</label>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-warning w-100">作成</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 課題一覧 + 全課題削除 -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0">課題一覧</h5>
        <form th:if="${!assignmentList.empty}"
              th:action="@{/instructor/assignments/delete-all}" method="post"
              onsubmit="return confirm('全課題を削除しますか？提出物も全て削除されます。')">
            <input type="hidden" name="courseId" th:value="${course.id}">
            <button type="submit" class="btn btn-danger btn-sm">🗑️ 全課題を削除</button>
        </form>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr><th>課題名</th><th>提出期限</th><th>公開状態</th><th>操作</th></tr>
        </thead>
        <tbody>
            <tr th:each="a : ${assignmentList}">
                <td th:text="${a.title}"></td>
                <td th:text="${#temporals.format(a.deadline, 'yyyy/MM/dd HH:mm')}"></td>
                <td>
                    <span th:if="${a.published}" class="badge bg-success">公開中</span>
                    <span th:unless="${a.published}" class="badge bg-secondary">非公開</span>
                </td>
                <td class="d-flex gap-2">
                    <!-- 公開切替 -->
                    <form th:action="@{/instructor/assignments/{id}/toggle(id=${a.id})}" method="post">
                        <input type="hidden" name="courseId" th:value="${course.id}">
                        <button type="submit" class="btn btn-sm"
                                th:classappend="${a.published} ? 'btn-outline-secondary' : 'btn-outline-success'"
                                th:text="${a.published} ? '非公開にする' : '公開する'"></button>
                    </form>
                    <!-- 1件削除 -->
                    <form th:action="@{/instructor/assignments/{id}/delete(id=${a.id})}" method="post"
                          onsubmit="return confirm('この課題を削除しますか？提出物も削除されます。')">
                        <input type="hidden" name="courseId" th:value="${course.id}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${assignmentList.empty}">
                <td colspan="4" class="text-muted text-center">課題が登録されていません</td>
            </tr>
        </tbody>
    </table>
</div>
</body></html>
